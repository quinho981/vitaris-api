  <!-- Gradient Blob Top -->
  <ellipse cx="650" cy="-100" rx="400" ry="300" fill="url(#grad1)" opacity="0.25"></ellipse>

  <!-- Gradient Blob Bottom -->
  <ellipse cx="100" cy="1150" rx="400" ry="300" fill="url(#grad2)" opacity="0.2"></ellipse>

  <!-- Soft Lines (tech feel) -->
  <path d="M0 300 C 200 250, 400 350, 794 280" stroke="#3B82F6" stroke-width="1.5" opacity="0.1"></path>
  <path d="M0 600 C 200 550, 500 650, 794 580" stroke="#3B82F6" stroke-width="1.5" opacity="0.08"></path>
  <path d="M0 900 C 300 850, 500 950, 794 880" stroke="#3B82F6" stroke-width="1.5" opacity="0.06"></path>

  <!-- Subtle Grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="1123" stroke="#3B82F6"></line>
    <line x1="100" y1="0" x2="100" y2="1123" stroke="#3B82F6"></line>
    <line x1="200" y1="0" x2="200" y2="1123" stroke="#3B82F6"></line>
    <line x1="300" y1="0" x2="300" y2="1123" stroke="#3B82F6"></line>
    <line x1="400" y1="0" x2="400" y2="1123" stroke="#3B82F6"></line>
    <line x1="500" y1="0" x2="500" y2="1123" stroke="#3B82F6"></line>
    <line x1="600" y1="0" x2="600" y2="1123" stroke="#3B82F6"></line>
    <line x1="700" y1="0" x2="700" y2="1123" stroke="#3B82F6"></line>
  </g>

  <!-- Footer Accent -->
